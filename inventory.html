<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventur</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #006060 0%, #096969 100%); min-height: 100vh; padding: 10px; display: flex; justify-content: center; align-items: flex-start; }
    .container { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); padding: 20px; max-width: 600px; width: 100%; margin: 10px 0; }
    h1 { text-align: center; font-size: 1.5rem; margin: 0 0 0.75rem; color: #333; }
    
    .top-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
    .nav-btn { padding: 10px; border: 2px solid #667eea; background: white; border-radius: 8px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; color: #667eea; font-size: 0.9rem; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
    .nav-btn:hover { background: #667eea; color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
    .nav-btn.active { background: #059669; border-color: #059669; color: white; }

    .row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
    .row label { margin: 0; white-space: nowrap; font-weight: 600; font-size: 0.9rem; color: #444; min-width: 80px; }
    .row input, .row select { flex: 1; padding: 10px 12px; font-size: 0.95rem; border-radius: 8px; border: 2px solid #e0e0e0; background: #f9f9f9; transition: all 0.3s ease; }
    .row input:focus, .row select:focus { outline: none; border-color: #667eea; background: white; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    
    .btn-primary { padding: 10px 16px; font-size: 0.95rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; white-space: nowrap; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; transition: all 0.3s ease; width: 100%; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    
    .btn-export { padding: 10px 16px; font-size: 0.95rem; border-radius: 8px; border: 2px solid #059669; background: white; color: #059669; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.3s ease; margin-top: 1rem; }
    .btn-export:hover { background: #059669; color: white; transform: translateY(-1px); }
    .btn-export:disabled { background: #f3f4f6; border-color: #d1d5db; color: #9ca3af; cursor: not-allowed; transform: none; }

    #status { text-align: center; margin: 0.5rem 0; min-height: 1.2em; color: #4b5563; font-size: 0.9rem; }
    #errorMsg { color: #dc2626; font-size: 0.85rem; text-align: center; margin: 0.5rem 0; background: #fef2f2; padding: 6px; border-radius: 6px; border: 1px solid #fecaca; display: none; }
    #successMsg { color: #059669; font-size: 0.85rem; text-align: center; margin: 0.5rem 0; background: #ecfdf5; padding: 6px; border-radius: 6px; border: 1px solid #a7f3d0; display: none; }

    .entries { margin-top: 1.5rem; border-top: 2px solid #eee; padding-top: 1rem; }
    .entries h3 { margin: 0 0 0.75rem; font-size: 1rem; color: #333; }
    
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f9fafb; font-weight: 600; color: #374151; white-space: nowrap; }
    td { color: #4b5563; }
    .loading { color: #888; font-size: 0.85rem; text-align: center; padding: 1rem; }
    
    @media (max-width: 500px) { 
      .container { padding: 15px; } 
      .top-bar { grid-template-columns: 1fr; } 
      .row { flex-wrap: wrap; } 
      .row label { width: 100%; margin-bottom: 0.25rem; min-width: auto; } 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Inventur</h1>
    
    <div class="top-bar">
      <a href="index.html" class="nav-btn">⏱️ Zeiterfassung</a>
      <a href="order.html" class="nav-btn">📦 Bestellung</a>
    </div>

    <div class="row">
      <label for="employee">Mitarbeiter:</label>
      <select id="employee"><option value="">-- Bitte wählen --</option></select>
    </div>
    
    <div class="row" id="passwordRow">
      <label for="password">Passwort:</label>
      <input type="password" id="password" placeholder="••••••">
    </div>

    <div id="status">Bitte Mitarbeiter wählen</div>
    <div id="errorMsg"></div>
    <div id="successMsg"></div>

    <div id="inputSection" style="display: none;">
      <div class="row">
        <label for="itemName">Artikel:</label>
        <input type="text" id="itemName" placeholder="z.B. Schrauben M6">
      </div>
      <div class="row">
        <label for="quantity">Menge:</label>
        <input type="number" id="quantity" placeholder="0" step="0.01">
      </div>
      <div class="row">
        <label for="unit">Einheit:</label>
        <select id="unit">
          <option value="Stück">Stück</option>
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="m">m</option>
          <option value="Packung">Packung</option>
          <option value="Karton">Karton</option>
        </select>
      </div>
      <div class="row">
        <label for="location">Ort / Regal:</label>
        <input type="text" id="location" placeholder="z.B. Regal A3">
      </div>
      <div class="row">
        <label for="note">Notiz:</label>
        <input type="text" id="note" placeholder="Optional">
      </div>
      <button id="addBtn" class="btn-primary">Eintrag hinzufügen</button>
    </div>

    <div class="entries" id="entriesSection" style="display: none;">
      <h3>Letzte Einträge (Heute)</h3>
      <div class="table-wrapper">
        <table id="inventoryTable">
          <thead>
            <tr>
              <th>Zeit</th>
              <th>Artikel</th>
              <th>Menge</th>
              <th>Ort</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="4" class="loading">Lade Daten...</td></tr>
          </tbody>
        </table>
      </div>
      <button id="exportBtn" class="btn-export">📥 Als Excel exportieren</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const showError = (msg) => { 
      const el = document.getElementById('errorMsg'); 
      el.textContent = msg; 
      el.style.display = 'block'; 
      document.getElementById('successMsg').style.display = 'none';
    };
    const showSuccess = (msg) => { 
      const el = document.getElementById('successMsg'); 
      el.textContent = msg; 
      el.style.display = 'block'; 
      document.getElementById('errorMsg').style.display = 'none';
      setTimeout(() => el.style.display = 'none', 4000); 
    };

    const firebaseConfig = { 
      apiKey: "AIzaSyDmJJV49Uik0ISYWDMEAoGfWTcgYeyjZs8", 
      authDomain: "fengsigns-timetracker.firebaseapp.com", 
      projectId: "fengsigns-timetracker", 
      storageBucket: "fengsigns-timetracker.firebasestorage.app", 
      messagingSenderId: "1035298719582", 
      appId: "1:1035298719582:web:0fe57c5141a7539b82b1cf" 
    };
    firebase.initializeApp(firebaseConfig); 
    const db = firebase.firestore(); 
    db.settings({ ignoreUndefinedProperties: true });
    
    // === STAFF / DROPDOWN ===
    let staffDB = {};
    const sel = document.getElementById('employee');
    const inputSection = document.getElementById('inputSection');
    const entriesSection = document.getElementById('entriesSection');
    const status = document.getElementById('status');
    const tableBody = document.getElementById('tableBody');
    const addBtn = document.getElementById('addBtn');
    const exportBtn = document.getElementById('exportBtn');
    
    let currentUser = localStorage.getItem('inv_user') || '';
    let todayEntries = [];

    async function loadStaff() {
      try {
        const res = await fetch('staff.json');
        if(!res.ok) throw new Error('HTTP '+res.status);
        staffDB = await res.json();
        
        // Dropdown aus staff.json befüllen (alphabetisch sortiert)
        const names = Object.keys(staffDB).sort((a, b) => a.localeCompare(b, 'de'));
        sel.innerHTML = '<option value="">-- Bitte wählen --</option>' + 
                        names.map(n => `<option value="${n}">${n}</option>`).join('');
        
        // Gespeicherten User wiederherstellen, falls noch in staff.json
        if(currentUser && staffDB[currentUser]) { 
          sel.value = currentUser; 
          handleUserChange(); 
        } else {
          currentUser = '';
          localStorage.removeItem('inv_user');
        }
      } catch(e) { 
        console.error('❌ staff.json Fehler:', e); 
        showError('Mitarbeiter-Daten nicht ladbar.'); 
      }
    }
    function checkPassword(name, pw) { return staffDB[name] && staffDB[name] === pw; }
    loadStaff();

    sel.addEventListener('change', handleUserChange);

    function handleUserChange() {
      currentUser = sel.value;
      if (currentUser) {
        localStorage.setItem('inv_user', currentUser);
      } else {
        localStorage.removeItem('inv_user');
      }
      document.getElementById('password').value = '';
      
      if (currentUser) {
        status.textContent = 'Bitte Passwort eingeben';
        status.style.color = '#4b5563';
        inputSection.style.display = 'none';
        entriesSection.style.display = 'none';
      } else {
        status.textContent = 'Bitte Mitarbeiter wählen';
        status.style.color = '#4b5563';
        inputSection.style.display = 'none';
        entriesSection.style.display = 'none';
      }
    }

    // Passwort-Check bei Eingabe
    document.getElementById('password').addEventListener('input', async (e) => {
      const pw = e.target.value;
      if (currentUser && checkPassword(currentUser, pw)) {
        status.textContent = 'Angemeldet als ' + currentUser;
        status.style.color = '#059669';
        inputSection.style.display = 'block';
        entriesSection.style.display = 'block';
        await loadTodayEntries();
      } else if (currentUser && pw.length > 0) {
        status.textContent = 'Falsches Passwort';
        status.style.color = '#dc2626';
        inputSection.style.display = 'none';
        entriesSection.style.display = 'none';
      } else {
        status.textContent = 'Bitte Passwort eingeben';
        status.style.color = '#4b5563';
        inputSection.style.display = 'none';
        entriesSection.style.display = 'none';
      }
    });

    async function loadTodayEntries() {
      if (!currentUser) return;
      tableBody.innerHTML = '<tr><td colspan="4" class="loading">Lade Daten...</td></tr>';
      try {
        const now = new Date();
        const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        
        const snap = await db.collection('inventory')
          .where('employee', '==', currentUser)
          .where('timestamp', '>=', startOfDay)
          .where('timestamp', '<', endOfDay)
          .orderBy('timestamp', 'desc')
          .get();
          
        todayEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTable();
      } catch(e) {
        console.error(e);
        tableBody.innerHTML = '<tr><td colspan="4" class="loading">Fehler beim Laden. Index fehlt ggf.</td></tr>';
      }
    }

    function renderTable() {
      if (todayEntries.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" class="loading">Keine Einträge heute.</td></tr>';
        return;
      }
      
      tableBody.innerHTML = todayEntries.map(e => {
        const date = e.timestamp?.toDate ? e.timestamp.toDate() : new Date(e.timestamp);
        const timeStr = date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        return `
          <tr>
            <td>${timeStr}</td>
            <td>${e.itemName || '-'}</td>
            <td>${e.quantity} ${e.unit}</td>
            <td>${e.location || '-'}</td>
          </tr>
        `;
      }).join('');
    }

    addBtn.addEventListener('click', async () => {
      const pw = document.getElementById('password').value;
      if (!checkPassword(currentUser, pw)) {
        showError('❌ Sitzung abgelaufen oder falsches Passwort.');
        return;
      }

      const itemName = document.getElementById('itemName').value.trim();
      const quantity = parseFloat(document.getElementById('quantity').value);
      const unit = document.getElementById('unit').value;
      const location = document.getElementById('location').value.trim();
      const note = document.getElementById('note').value.trim();

      if (!itemName || isNaN(quantity)) {
        showError('Bitte Artikelname und gültige Menge eingeben.');
        return;
      }

      addBtn.disabled = true;
      addBtn.textContent = 'Speichere...';
      document.getElementById('errorMsg').style.display = 'none';

      try {
        await db.collection('inventory').add({
          employee: currentUser,
          itemName,
          quantity,
          unit,
          location,
          note,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        showSuccess('✅ Eintrag erfolgreich gespeichert.');
        document.getElementById('itemName').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('location').value = '';
        document.getElementById('note').value = '';
        document.getElementById('itemName').focus();
        
        await loadTodayEntries();
      } catch(e) {
        showError('Fehler beim Speichern: ' + e.message);
      } finally {
        addBtn.disabled = false;
        addBtn.textContent = 'Eintrag hinzufügen';
      }
    });

    exportBtn.addEventListener('click', () => {
      if (todayEntries.length === 0) {
        showError('Keine Daten zum Exportieren vorhanden.');
        return;
      }

      exportBtn.disabled = true;
      exportBtn.textContent = 'Erstelle Datei...';

      try {
        const wsData = [
          ['Datum', 'Uhrzeit', 'Mitarbeiter', 'Artikel', 'Menge', 'Einheit', 'Ort', 'Notiz']
        ];

        const sorted = [...todayEntries].sort((a, b) => {
          const ta = a.timestamp?.toDate ? a.timestamp.toDate() : new Date(a.timestamp);
          const tb = b.timestamp?.toDate ? b.timestamp.toDate() : new Date(b.timestamp);
          return ta - tb;
        });

        sorted.forEach(e => {
          const date = e.timestamp?.toDate ? e.timestamp.toDate() : new Date(e.timestamp);
          const dateStr = date.toLocaleDateString('de-DE');
          const timeStr = date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
          
          wsData.push([
            dateStr,
            timeStr,
            e.employee,
            e.itemName,
            e.quantity,
            e.unit,
            e.location || '',
            e.note || ''
          ]);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        
        ws['!cols'] = [
          { wch: 10 }, { wch: 8 }, { wch: 12 }, { wch: 25 }, 
          { wch: 10 }, { wch: 10 }, { wch: 15 }, { wch: 20 }
        ];

        const now = new Date();
        const filename = `Inventur_${currentUser}_${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}.xlsx`;
        
        XLSX.utils.book_append_sheet(wb, ws, "Inventur");
        XLSX.writeFile(wb, filename);
        
        showSuccess('✅ Excel-Datei heruntergeladen.');
      } catch(e) {
        showError('Export-Fehler: ' + e.message);
      } finally {
        exportBtn.disabled = false;
        exportBtn.textContent = '📥 Als Excel exportieren';
      }
    });
  </script>
</body>
</html>
