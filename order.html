<!DOCTYPE html>

    <title>Lager Bestellung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006060 0%, #096969 100%);
            min-height: 100vh;
            padding: 10px;
		overflow-x: hidden;
		width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 600px;
            width: 100%;
            margin: 10px 0;
        }
        h1, h2 {
            color: #333;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #444;
            font-weight: 600;
            font-size: 13px;
        }
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
        }
        .autocomplete-container {
            position: relative;
        }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: none;
        }
        .autocomplete-list.active {
            display: block;
        }
.autocomplete-list::-webkit-scrollbar {
  width: 12px;
}
.autocomplete-list::-webkit-scrollbar-track {
  background: #f1f1f1;
  border-radius: 6px;
}
.autocomplete-list::-webkit-scrollbar-thumb {
  background: #667eea;
  border-radius: 6px;
  border: 3px solid #f1f1f1;
}
.order-product,
.product-name,
.article-number,
.autocomplete-item .product-name {
  overflow-wrap: break-word;
  word-break: break-word;
}
.autocomplete-list::-webkit-scrollbar-thumb:hover {
	background: #2abbbb;
	}
        .autocomplete-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s ease;
            border-bottom: 1px solid #f0f0f0;
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-item:hover {
            background: #e8ebf9;
        }
        .autocomplete-item .article-number {
            font-weight: 600;
            color: #667eea;
        }

		 overflow-wrap: break-word;
		word-wrap: break-word;
		word-break: break-word;
		hyphens: auto;
  		color: #666;

    const firebaseConfig = {

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

let productsDB = [];

async function loadProducts() {
  try {
    const response = await fetch('products.json');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    productsDB = await response.json();
    console.log('✅ Produkte geladen:', productsDB.length);
  } catch (err) {
    console.error('❌ Fehler beim Laden von products.json:', err);
    alert('Produktdaten konnten nicht geladen werden. Bitte prüfe products.json.');
  }
}

// Lade Produkte beim Start — vor allen Interaktionen!
document.addEventListener('DOMContentLoaded', () => {
  loadProducts().then(() => {
    // Optional: initiale Felder fokussieren, Autocomplete vorbereiten, etc.
    document.getElementById('articleNumber')?.focus();
  });
});


    // === AUTOCOMPLETE FÜR EINZELANSICHT ===
    const articleInput = document.getElementById('articleNumber');
    const productInput = document.getElementById('productName');
    const articleAutocomplete = document.getElementById('articleAutocomplete');
    const productAutocomplete = document.getElementById('productAutocomplete');

    function setupAutocomplete(inputElement, autocompleteElement, searchBy) {
      inputElement.addEventListener('input', function() {
        const value = this.value.toLowerCase().trim();
        autocompleteElement.innerHTML = '';
        if (value.length === 0) {
          autocompleteElement.classList.remove('active');
          return;
        }
        const filtered = productsDB.filter(product => {
          if (searchBy === 'article') {
            return product.articleNumber.toLowerCase().includes(value);
          } else {
            return product.productName.toLowerCase().includes(value);
          }
        });
        if (filtered.length > 0) {
          filtered.forEach(product => {
            const div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.innerHTML = `
              <div class="article-number">${product.articleNumber}</div>
              <div class="product-name">${product.productName}</div>
            `;
            div.addEventListener('click', function() {
              articleInput.value = product.articleNumber;
              productInput.value = product.productName;
              articleAutocomplete.classList.remove('active');
              productAutocomplete.classList.remove('active');
            });
            autocompleteElement.appendChild(div);
          });
          autocompleteElement.classList.add('active');
        } else {
          autocompleteElement.classList.remove('active');
        }
      });
    }
    setupAutocomplete(articleInput, articleAutocomplete, 'article');
    setupAutocomplete(productInput, productAutocomplete, 'product');

    // === FORM SUBMIT EINZELANSICHT ===
    const form = document.getElementById('orderForm');
    const successMessage = document.getElementById('successMessage');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const preservedValues = {
        department: document.getElementById('department').value,
        deliveryDate: document.getElementById('deliveryDate').value,
        deliveryTime: document.getElementById('deliveryTime').value
      };
      let deliveryDateTime = new Date();
      const deliveryDateValue = document.getElementById('deliveryDate').value;
      const deliveryTimeValue = document.getElementById('deliveryTime').value;

	if (deliveryDateValue === 'tomorrow') deliveryDateTime.setDate(deliveryDateTime.getDate() + 1);

	} else {

	}
	deliveryDateTime.setDate(deliveryDateTime.getDate() + daysToAdd);

// === AUTOCOMPLETE FÜR TABELLENZEILEN ===
function setupRowAutocomplete(articleInput, productInput) {
  function createAutocomplete(input, searchBy) {
    // Container = nächstes verfügbares Elternelement außerhalb der Zelle (body)
    const container = document.body; // ⬅️ Wichtig: nicht in <td> rendern!
    let list = document.getElementById('ac-list-' + input.getAttribute('data-id'));
    if (!list) {
      list = document.createElement('div');
      const uniqueId = 'ac-' + Date.now() + Math.random().toString(36).substr(2, 5);
      input.setAttribute('data-id', uniqueId);
      list.id = 'ac-list-' + uniqueId;
      list.className = 'autocomplete-list';
      list.style.position = 'absolute';
      list.style.zIndex = '2000';
      container.appendChild(list);
    }

    input.addEventListener('input', () => {
      const val = input.value.toLowerCase().trim();
      list.innerHTML = '';
      if (val.length === 0) {
        list.classList.remove('active');
        return;
      }

      const filtered = productsDB.filter(p =>
        searchBy === 'article'
          ? p.articleNumber.toLowerCase().includes(val)
          : p.productName.toLowerCase().includes(val)
      );

      if (filtered.length > 0) {
        filtered.forEach(p => {
          const item = document.createElement('div');
          item.className = 'autocomplete-item';
          item.innerHTML = `
            <div class="article-number">${p.articleNumber}</div>
            <div class="product-name">${p.productName}</div>
          `;
          item.addEventListener('click', () => {
            articleInput.value = p.articleNumber;
            productInput.value = p.productName;
            list.classList.remove('active');
            document.querySelectorAll('.autocomplete-list').forEach(l => l.classList.remove('active'));
          });
          list.appendChild(item);
        });
        // Position direkt unter dem Eingabefeld
        const rect = input.getBoundingClientRect();
        list.style.top = (rect.bottom + window.scrollY) + 'px';
        list.style.left = (rect.left + window.scrollX) + 'px';
        list.style.width = rect.width + 'px';
        list.classList.add('active');
      } else {
        list.classList.remove('active');
      }
    });
  }

  // Eindeutige IDs für Inputs (damit mehrere Zeilen funktionieren)
  if (!articleInput.hasAttribute('data-id')) articleInput.setAttribute('data-id', 'ac-' + Date.now() + '-a');
  if (!productInput.hasAttribute('data-id')) productInput.setAttribute('data-id', 'ac-' + Date.now() + '-p');

  createAutocomplete(articleInput, 'article');
  createAutocomplete(productInput, 'product');

  // Schließen beim Klick außerhalb
  document.addEventListener('click', (e) => {
    if (!articleInput.contains(e.target) && !productInput.contains(e.target)) 
	{document.querySelectorAll('.autocomplete-list').forEach(l => l.classList.remove('active'));}
  });
}

document.getElementById('submitTableBtn').addEventListener('click', async function() {
  const dept = document.getElementById('tableViewDepartment').value;
  const date = document.getElementById('tableViewDeliveryDate').value;
  const time = document.getElementById('tableViewDeliveryTime').value;

  if (!dept || !date || !time) {
    alert('⚠️ Bitte Bereich, Liefertag und Lieferzeit auswählen.');
    return;
  }

  // Berechne deliveryDateTime wie in Einzelansicht
  let deliveryDateTime = new Date();
  if (date === 'tomorrow') deliveryDateTime.setDate(deliveryDateTime.getDate() + 1);
  else if (date === 'dayAfterTomorrow') {deliveryDateTime.setDate(deliveryDateTime.getDate() + 2);}
	else if (date === 'monday') {const today = deliveryDateTime.getDay();
	let daysToAdd;
	if (today === 0) daysToAdd = 1;
	else if (today === 1) daysToAdd = 7;
	else daysToAdd = 8 - today;
	deliveryDateTime.setDate(deliveryDateTime.getDate() + daysToAdd);
	}
  const [hours, minutes] = time.split('-')[0].split(':');
  deliveryDateTime.setHours(parseInt(hours), parseInt(minutes), 0, 0);

  const rows = document.querySelectorAll('.table-row');
  const batch = db.batch();
  let hasValidRow = false;

  for (const row of rows) {
    const articleNumber = row.querySelector('.article-number').value.trim();
    const productName = row.querySelector('.product-name').value.trim();
    const quantity = parseFloat(row.querySelector('.quantity').value) || 0;
    const unit = row.querySelector('.unit').value;
    if (!articleNumber || !productName || quantity <= 0 || !unit) continue;

    const orderData = {
      articleNumber,
      productName,
      quantity,
      unit,
      department: dept,
      deliveryDate: date,
      deliveryTime: time,
      deliveryDateTime: firebase.firestore.Timestamp.fromDate(deliveryDateTime),
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'offen'
    };
    batch.set(db.collection('orders').doc(), orderData);
    hasValidRow = true;
  }

  if (!hasValidRow) {
    alert('⚠️ Keine gültigen Bestellzeilen gefunden.');
    return;
  }

  try {
    await batch.commit();
    alert('✅ Tabellenbestellungen erfolgreich gespeichert!');
    // Optional: Tabelle zurücksetzen
    document.querySelector('#orderTable tbody').innerHTML = `
      <tr>
        <td><input type="text" class="article-number" placeholder="1500000"></td>
        <td><input type="text" class="product-name" placeholder="Produktname"></td>
        <td><input type="number" class="quantity" placeholder="1" min="0" step="0.1"></td>
        <td>
          <select class="unit">
            <option value="kg">kg</option>
            <option value="Karton">Karton</option>
            <option value="Stück">Stück</option>
            <option value="Pal">Pallette</option>
	    <option value="l">l</option>
          </select>
        </td>
        <td><button class="remove-row">🗑️</button></td>
      </tr>
    `;
    // Autocomplete für neue erste Zeile
    document.querySelectorAll('.remove-row').forEach(btn => {
      btn.addEventListener('click', function() { this.closest('tr').remove(); });
    });
    // Felder leeren
    document.getElementById('tableViewDepartment').value = '';
    document.getElementById('tableViewDeliveryDate').value = '';
    document.getElementById('tableViewDeliveryTime').value = '';
  } catch (error) {
    console.error('Fehler:', error);
    alert('❌ Fehler: ' + error.message);
  }
});

    // === BESTELLUNGEN LADEN ===
    let currentFilter = 'all';
    let currentDepartment = 'all';

    function isSameDay(date1, date2) {
      return date1.getFullYear() === date2.getFullYear() &&
             date1.getMonth() === date2.getMonth() &&
             date1.getDate() === date2.getDate();
    }

    function getRelativeDeliveryLabel(deliveryDate) {
      if (!deliveryDate) return 'Unbekannt';
      const now = new Date();
      const delivery = deliveryDate.toDate ? deliveryDate.toDate() : deliveryDate;
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const deliveryDay = new Date(delivery.getFullYear(), delivery.getMonth(), delivery.getDate());
      const diffTime = deliveryDay.getTime() - today.getTime();
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Heute';
      else if (diffDays === 1) return 'Morgen';
      else if (diffDays === 2) return 'Übermorgen';
      else if (diffDays < 0) return `! ${delivery.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })}`;
      else return delivery.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
    }

    function loadOrders() {
      db.collection('orders').onSnapshot((snapshot) => {
        const ordersList = document.getElementById('ordersList');
        if (snapshot.empty) {
          ordersList.innerHTML = '<div class="no-orders">Keine Bestellungen vorhanden</div>';
          return;
        }
        let orders = [];
        snapshot.forEach((doc) => {
          const order = { id: doc.id, ...doc.data() };
	  if (order.status === 'aufgebraucht') return;
          if (currentFilter === 'offen' && order.status !== 'offen') return;
          if (currentFilter === 'vorbereitet' && order.status !== 'vorbereitet') return;
          if (currentFilter === 'all' && order.status === 'erledigt') return; // "erledigt" auch ausblenden bei "Alle"
          if (currentDepartment !== 'all' && order.department !== currentDepartment) return;
          orders.push(order);
        });
        orders.sort((a, b) => {
          if (!a.deliveryDateTime || !b.deliveryDateTime) return 0;
          return a.deliveryDateTime.seconds - b.deliveryDateTime.seconds;
        });
        ordersList.innerHTML = '';
        orders.forEach((order) => {
          const card = document.createElement('div');
          card.className = `order-card ${order.status}`;
          const statusText = order.status === 'offen' ? 'Offen' : 'Vorbereitet';
          const deliveryDisplay = getRelativeDeliveryLabel(order.deliveryDateTime);
          if (deliveryDisplay.startsWith('!')) card.classList.add('overdue');
          card.innerHTML = `
            <div class="order-header">
              <div class="order-product">${order.productName}</div>
              <div class="order-quantity">${order.quantity}&nbsp;${order.unit}</div>
              <div class="order-status ${order.status}">${statusText}</div>
            </div>
            <div class="order-details">
              Art-Nr: ${order.articleNumber} · ${order.department}, 📅 ${deliveryDisplay}, ${order.deliveryTime}
            </div>
	<div class="comment-section" style="margin-top:8px;">
	  <button class="toggle-comment" data-id="${order.id}" style="font-size:12px; padding:4px 8px; background:#eee; border:1px solid #ccc; border-radius:4px; cursor:pointer;">💬 Notiz</button>
	  <div class="comment-editor" data-id="${order.id}" style="display:none; margin-top:6px;">
	    <textarea class="comment-input" data-id="${order.id}" style="width:100%; padding:6px; font-size:14px; border:1px solid #ccc; border-radius:4px;" rows="2">${order.comment || ''}</textarea>
 	   <div style="margin-top:4px;">
 	     <button class="save-comment" data-id="${order.id}" style="padding:4px 8px; background:#667eea; color:white; border:none; border-radius:4px; font-size:12px;">Sichern</button>
	     <button class="cancel-comment" data-id="${order.id}" style="padding:4px 8px; background:#ccc; border:none; border-radius:4px; font-size:12px; margin-left:6px;">Abbrechen</button>
	    </div>
	  </div>
	</div>
          `;
          ordersList.appendChild(card);
        });
        if (orders.length === 0) {
          ordersList.innerHTML = '<div class="no-orders">Keine Bestellungen vorhanden</div>';
        }
      }, (error) => {
        console.error('Fehler beim Laden:', error);
        document.getElementById('ordersList').innerHTML = `<div class="no-orders">Fehler: ${error.message}</div>`;
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        loadOrders();
      });
    });

    document.querySelectorAll('.dept-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentDepartment = this.dataset.department;
        loadOrders();
      });
    });

let usedItemsVisible = false;
const toggleUsedBtn = document.getElementById('toggleUsedBtn');
const usedItemsList = document.getElementById('usedItemsList');

function renderUsedItems(orders) {
  if (orders.length === 0) {
    usedItemsList.innerHTML = '<div class="no-orders">Keine aufgebrauchten Artikel</div>';
    return;
  }
  usedItemsList.innerHTML = '';
  orders.forEach((order) => {
    const card = document.createElement('div');
    card.className = 'order-card';
    card.style.borderLeftColor = '#866'; // neutrale Farbe für "aufgebraucht"
    card.dataset.orderId = order.id;

    const deliveryDisplay = getRelativeDeliveryLabel(order.deliveryDateTime);
    card.innerHTML = `
      <div class="order-header">
        <div class="order-product">${order.productName}</div>
        <div class="order-quantity">${order.quantity}&nbsp;${order.unit}</div>
        <div class="order-status" style="background:#866;">Aufgebraucht</div>
      </div>
      <div class="order-details">
        Art-Nr: ${order.articleNumber} · ${order.department}, 📅 ${deliveryDisplay}, ${order.deliveryTime}
      </div>
    `;
card.addEventListener('click', async () => {
      try {
        await db.collection('orders').doc(order.id).update({
          status: 'erledigt'
        });
        // Optional: visuelles Feedback oder automatisches Entfernen
        card.remove();
      } catch (error) {
        console.error('Fehler beim Aktualisieren des Status:', error);
        alert('Fehler: Status konnte nicht geändert werden.');
      }
    });


    usedItemsList.appendChild(card);
  });
}

// Echtzeit-Listener für "aufgebraucht"
let usedUnsub = null;

toggleUsedBtn.addEventListener('click', () => {
  usedItemsVisible = !usedItemsVisible;
  usedItemsList.style.display = usedItemsVisible ? 'block' : 'none';
  toggleUsedBtn.textContent = usedItemsVisible ? '❌' : '🚫';

  if (usedItemsVisible) {
    // Firestore-Listener starten
    usedUnsub = db.collection('orders')
      .where('status', '==', 'aufgebraucht')
      .onSnapshot((snapshot) => {
        const orders = [];
        snapshot.forEach(doc => {
          orders.push({ id: doc.id, ...doc.data() });
        });
        orders.sort((a, b) => (a.deliveryDateTime?.seconds || 0) - (b.deliveryDateTime?.seconds || 0));
        renderUsedItems(orders);
      }, (error) => {
        console.error('Fehler beim Laden der aufgebrauchten Artikel:', error);
        usedItemsList.innerHTML = `<div class="no-orders">Fehler: ${error.message}</div>`;
      });
  } else {
    // Listener beenden, um Ressourcen zu sparen
    if (usedUnsub) {
      usedUnsub();
      usedUnsub = null;
    }
  }
});

  const win = window.open('bom-plan.html', '_blank');

});

// Simple comment editor
document.getElementById('ordersList').addEventListener('click', async (e) => {
  const orderId = e.target.closest('[data-id]')?.dataset.id;
  if (!orderId) return;

  if (e.target.classList.contains('toggle-comment')) {
    const editor = document.querySelector(`.comment-editor[data-id="${orderId}"]`);
    editor.style.display = editor.style.display === 'block' ? 'none' : 'block';
    return;
  }

  if (e.target.classList.contains('save-comment')) {
    const textarea = document.querySelector(`.comment-input[data-id="${orderId}"]`);
    const comment = textarea.value.trim();
    try {
      await db.collection('orders').doc(orderId).update({
        comment: comment || firebase.firestore.FieldValue.delete()
      });
      // Hide editor after save
      document.querySelector(`.comment-editor[data-id="${orderId}"]`).style.display = 'none';
    } catch (err) {
      console.error('Fehler beim Speichern:', err);
      alert('Fehler: ' + (err.message || 'Speichern fehlgeschlagen.'));
    }
    return;
  }

  if (e.target.classList.contains('cancel-comment')) {
    document.querySelector(`.comment-editor[data-id="${orderId}"]`).style.display = 'none';
  }
});
