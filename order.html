<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com; style-src 'self' 'unsafe-inline';">
    <title>Lager Bestellung</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #006060 0%, #096969 100%); min-height: 100vh; padding: 10px; overflow-x: hidden; width: 100%; display: flex; justify-content: center; align-items: flex-start; }
        .container { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); padding: 20px; max-width: 600px; width: 100%; margin: 10px 0; }
        h1, h2 { color: #333; margin-bottom: 5px; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 13px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #444; font-weight: 600; font-size: 13px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: all 0.3s ease; background: #f9f9f9; }
        input:focus, select:focus { outline: none; border-color: #667eea; background: white; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
        .autocomplete-container { position: relative; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid #667eea; border-top: none; border-radius: 0 0 10px 10px; max-height: 200px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); display: none; }
        .autocomplete-list.active { display: block; }
        .autocomplete-list::-webkit-scrollbar { width: 12px; }
        .autocomplete-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 6px; }
        .autocomplete-list::-webkit-scrollbar-thumb { background: #667eea; border-radius: 6px; border: 3px solid #f1f1f1; }
        .order-product, .product-name, .article-number, .autocomplete-item .product-name { overflow-wrap: break-word; word-break: break-word; }
        .autocomplete-list::-webkit-scrollbar-thumb:hover { background: #2abbbb; }
        .autocomplete-item { padding: 12px 15px; cursor: pointer; transition: background 0.2s ease; border-bottom: 1px solid #f0f0f0; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: #e8ebf9; }
        .autocomplete-item .article-number { font-weight: 600; color: #667eea; }
        .autocomplete-item .product-name { overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; hyphens: auto; color: #666; font-size: 14px; }
        button[type="submit"] { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 5px; }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        button[type="submit"]:active { transform: translateY(0); }
        .success-message { display: none; background: #4caf50; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: 600; }
        @media (max-width: 600px) { .container { position: relative; padding: 25px; } h1 {font-size: 24px;} .row {grid-template-columns: 1fr;} }
        .orders-section { margin-top: 40px; padding-top: 30px; border-top: 2px solid #e0e0e0; }
        .orders-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .orders-header h2 { color: #333; font-size: 22px; }
        .filter-buttons { display: flex; gap: 8px; }
        .filter-btn { padding: 6px 12px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.3s ease; }
        .filter-btn.active { background: #667eea; color: white; }
        .orders-list { display: flex; flex-direction: column; gap: 15px; max-height: 400px; overflow-y: auto; }
        .order-card { background: #f9f9f9; border-radius: 10px; padding: 15px; border-left: 4px solid #FF9800; }
        .order-card.vorbereitet { border-left-color: #2196F3; }
        .order-card.overdue { border-left-color: #f44336; background: #fff8f8; }
        .order-header { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
        .order-product { flex: 1; text-align: left; font-weight: bold; overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; hyphens: auto; color: #333; }
        .order-quantity { font-weight: bold; color: #555; white-space: nowrap; margin-right: 8px; }
        .order-status { font-size: 12px; padding: 4px 8px; border-radius: 6px; background: #FF9800; color: white; white-space: nowrap; }
        .order-status.vorbereitet { background: #2196F3; }
        .order-details { font-size: 16px; color: #666; line-height: 1.6; }
        .no-orders { text-align: center; padding: 30px; color: #999; }
        #backToTimeBtn { padding: 8px 12px; font-size: 18px; position: absolute; top: 10px; right: 10px; border-radius: 50%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); z-index: 10; cursor: pointer; border: none; transition: transform 0.2s; }
        #backToTimeBtn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
<a id="backToTimeBtn" href="index.html" title="Zurück zur Zeiterfassung">⏱️</a>
  <div class="container">
    <h1>📦 Lager Bestellung</h1>
    <p class="subtitle">Artikel aktualisiert: 25.05.26</p>
    <div id="successMessage" class="success-message">✓ Bestellung erfolgreich übermittelt!</div>
    <form id="orderForm">
      <div class="form-group"><label for="articleNumber">Artikelnummer *</label><div class="autocomplete-container"><input type="text" id="articleNumber" name="articleNumber" required placeholder="z.B. 1712" autocomplete="off"><div id="articleAutocomplete" class="autocomplete-list"></div></div></div>
      <div class="form-group"><label for="productName">Produktname *</label><div class="autocomplete-container"><input type="text" id="productName" name="productName" required placeholder="z.B. Armband" autocomplete="off"><div id="productAutocomplete" class="autocomplete-list"></div></div></div>
      <div class="form-group"><div class="row"><div><label for="quantity">Menge *</label><input type="number" id="quantity" name="quantity" required min="0" step="0.5" placeholder="z.B. 12"></div><div><label for="unit">Einheit *</label><select id="unit" name="unit" required><option value="">Wählen...</option><option value="Karton">Karton</option><option value="Stück">Stück</option><option value="kg">kg</option></select></div></div></div>
     <button type="submit">Bestellung absenden</button>
    </form>
    <div class="orders-section">
      <div class="orders-header"><h2>Aktuelle Bestellungen</h2><div class="filter-buttons"><button class="filter-btn active" data-filter="all">Alle</button><button class="filter-btn" data-filter="offen">Offen</button><button class="filter-btn" data-filter="vorbereitet">Vorbereitet</button></div></div>
      <div id="ordersList" class="orders-list"><div class="no-orders">Lade Bestellungen...</div></div>
    </div>
    <button id="toggleUsedBtn" style="padding: 8px 12px; font-size: 18px; margin-top: 20px; border-radius: 20%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; border: none;">📋</button>
    <button id="toTimeTrackerBtn" style="padding: 8px 12px; font-size: 18px; margin-top: 20px; border-radius: 20%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; border: none;">⏱️</button>
      
    <div id="usedItemsList" class="orders-list" style="display: none; margin-top: 20px; max-height: 300px; overflow-y: auto;"><div class="no-orders">Lade aufgebrauchte Artikel...</div></div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = { apiKey: "AIzaSyA19l383lvcSlnaizQd53_3WtJ9iN12zwQ", authDomain: "mlnr-lager.firebaseapp.com", projectId: "mlnr-lager", storageBucket: "mlnr-lager.firebasestorage.app", messagingSenderId: "570845001445", appId: "1:570845001445:web:5443379267a060f4dc460c" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); let productsDB = [];
    async function loadProducts() { try { const response = await fetch('https://squallwolf.github.io/FengSigns-TimeTracker/products.json'); if (!response.ok) throw new Error(`HTTP ${response.status}`); productsDB = await response.json(); console.log('✅ Produkte geladen:', productsDB.length); } catch (err) { console.error('❌ Fehler beim Laden von products.json:', err); alert('Produktdaten konnten nicht geladen werden. Bitte prüfe products.json.'); } }
    document.addEventListener('DOMContentLoaded', () => { loadProducts().then(() => { document.getElementById('articleNumber')?.focus(); }); });
    const articleInput = document.getElementById('articleNumber'), productInput = document.getElementById('productName'), articleAutocomplete = document.getElementById('articleAutocomplete'), productAutocomplete = document.getElementById('productAutocomplete');
    function setupAutocomplete(inputElement, autocompleteElement, searchBy) { inputElement.addEventListener('input', function() { const value = this.value.toLowerCase().trim(); autocompleteElement.innerHTML = ''; if (value.length === 0) { autocompleteElement.classList.remove('active'); return; } const filtered = productsDB.filter(product => { if (searchBy === 'article') { return product.articleNumber.toLowerCase().includes(value); } else { return product.productName.toLowerCase().includes(value); } }); if (filtered.length > 0) { filtered.forEach(product => { const div = document.createElement('div'); div.className = 'autocomplete-item'; div.innerHTML = `<div class="article-number">${product.articleNumber}</div><div class="product-name">${product.productName}</div>`; div.addEventListener('click', function() { articleInput.value = product.articleNumber; productInput.value = product.productName; articleAutocomplete.classList.remove('active'); productAutocomplete.classList.remove('active'); }); autocompleteElement.appendChild(div); }); autocompleteElement.classList.add('active'); } else { autocompleteElement.classList.remove('active'); } }); }
    setupAutocomplete(articleInput, articleAutocomplete, 'article'); setupAutocomplete(productInput, productAutocomplete, 'product');
    const form = document.getElementById('orderForm'), successMessage = document.getElementById('successMessage');
    form.addEventListener('submit', async function(e) { e.preventDefault(); let deliveryDateTime = new Date(); const deliveryDateValue = document.getElementById('deliveryDate').value, deliveryTimeValue = document.getElementById('deliveryTime').value; if (deliveryDateValue === 'tomorrow') deliveryDateTime.setDate(deliveryDateTime.getDate() + 1); else if (deliveryDateValue === 'dayAfterTomorrow') deliveryDateTime.setDate(deliveryDateTime.getDate() + 2); else if (deliveryDateValue === 'monday') { const today = deliveryDateTime.getDay(); let daysToAdd = (today === 1) ? 7 : (8 - today) % 7; deliveryDateTime.setDate(deliveryDateTime.getDate() + daysToAdd); const startTime = deliveryTimeValue.split('-')[0]; const [hours, minutes] = startTime.split(':'); deliveryDateTime.setHours(parseInt(hours), parseInt(minutes), 0, 0); } const formData = { articleNumber: document.getElementById('articleNumber').value, productName: document.getElementById('productName').value, quantity: parseFloat(document.getElementById('quantity').value), unit: document.getElementById('unit').value, department: document.getElementById('department').value, deliveryDate: deliveryDateValue, deliveryTime: deliveryTimeValue, deliveryDateTime: firebase.firestore.Timestamp.fromDate(deliveryDateTime), timestamp: firebase.firestore.FieldValue.serverTimestamp(), status: 'offen' }; try { const docRef = await db.collection('orders').add(formData); successMessage.textContent = '✓ Bestellung erfolgreich übermittelt! (ID: ' + docRef.id + ')'; successMessage.style.display = 'block'; document.getElementById('articleNumber').value = ''; document.getElementById('productName').value = ''; document.getElementById('quantity').value = ''; document.getElementById('unit').value = ''; document.getElementById('articleNumber').focus(); setTimeout(() => { successMessage.style.display = 'none'; successMessage.textContent = '✓ Bestellung erfolgreich übermittelt!'; }, 5000); } catch (error) { alert('Fehler beim Übermitteln der Bestellung:\n' + error.message); } });
    let currentFilter = 'all', currentDepartment = 'all';
    function getRelativeDeliveryLabel(deliveryDate) { if (!deliveryDate) return 'Unbekannt'; const now = new Date(); const delivery = deliveryDate.toDate ? deliveryDate.toDate() : deliveryDate; const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); const deliveryDay = new Date(delivery.getFullYear(), delivery.getMonth(), delivery.getDate()); const diffTime = deliveryDay.getTime() - today.getTime(); const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)); if (diffDays === 0) return 'Heute'; else if (diffDays === 1) return 'Morgen'; else if (diffDays === 2) return 'Übermorgen'; else if (diffDays < 0) return `! ${delivery.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })}`; else return delivery.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }); }
    function loadOrders() { db.collection('orders').onSnapshot((snapshot) => { const ordersList = document.getElementById('ordersList'); if (snapshot.empty) { ordersList.innerHTML = '<div class="no-orders">Keine Bestellungen vorhanden</div>'; return; } let orders = []; snapshot.forEach((doc) => { const order = { id: doc.id, ...doc.data() }; if (order.status === 'aufgebraucht') return; if (currentFilter === 'offen' && order.status !== 'offen') return; if (currentFilter === 'vorbereitet' && order.status !== 'vorbereitet') return; if (currentFilter === 'all' && order.status === 'erledigt') return; if (currentDepartment !== 'all' && order.department !== currentDepartment) return; orders.push(order); }); orders.sort((a, b) => { if (!a.deliveryDateTime || !b.deliveryDateTime) return 0; return a.deliveryDateTime.seconds - b.deliveryDateTime.seconds; }); ordersList.innerHTML = ''; orders.forEach((order) => { const card = document.createElement('div'); card.className = `order-card ${order.status}`; const statusText = order.status === 'offen' ? 'Offen' : 'Vorbereitet'; const deliveryDisplay = getRelativeDeliveryLabel(order.deliveryDateTime); if (deliveryDisplay.startsWith('!')) card.classList.add('overdue'); card.innerHTML = `<div class="order-header"><div class="order-product">${order.productName}</div><div class="order-quantity">${order.quantity}&nbsp;${order.unit}</div><div class="order-status ${order.status}">${statusText}</div></div><div class="order-details">Art-Nr: ${order.articleNumber} · ${order.department}, 📅 ${deliveryDisplay}, ${order.deliveryTime}</div><div class="comment-section" style="margin-top:8px;"><button class="toggle-comment" data-id="${order.id}" style="font-size:12px; padding:4px 8px; background:#eee; border:1px solid #ccc; border-radius:4px; cursor:pointer;">💬 Notiz</button><div class="comment-editor" data-id="${order.id}" style="display:none; margin-top:6px;"><textarea class="comment-input" data-id="${order.id}" style="width:100%; padding:6px; font-size:14px; border:1px solid #ccc; border-radius:4px;" rows="2">${order.comment || ''}</textarea><div style="margin-top:4px;"><button class="save-comment" data-id="${order.id}" style="padding:4px 8px; background:#667eea; color:white; border:none; border-radius:4px; font-size:12px;">Sichern</button><button class="cancel-comment" data-id="${order.id}" style="padding:4px 8px; background:#ccc; border:none; border-radius:4px; font-size:12px; margin-left:6px;">Abbrechen</button></div></div></div>`; ordersList.appendChild(card); }); if (orders.length === 0) { ordersList.innerHTML = '<div class="no-orders">Keine Bestellungen vorhanden</div>'; } }, (error) => { console.error('Fehler beim Laden:', error); document.getElementById('ordersList').innerHTML = `<div class="no-orders">Fehler: ${error.message}</div>`; }); }
    document.getElementById('toTimeTrackerBtn')?.addEventListener('click', () => { window.location.href = 'index.html'; });
    document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', function() { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentFilter = this.dataset.filter; loadOrders(); }); });
    let usedItemsVisible = false; const toggleUsedBtn = document.getElementById('toggleUsedBtn'), usedItemsList = document.getElementById('usedItemsList');
    function renderUsedItems(orders) { if (orders.length === 0) { usedItemsList.innerHTML = '<div class="no-orders">Keine aufgebrauchten Artikel</div>'; return; } usedItemsList.innerHTML = ''; orders.forEach((order) => { const card = document.createElement('div'); card.className = 'order-card'; card.style.borderLeftColor = '#866'; card.dataset.orderId = order.id; const deliveryDisplay = getRelativeDeliveryLabel(order.deliveryDateTime); card.innerHTML = `<div class="order-header"><div class="order-product">${order.productName}</div><div class="order-quantity">${order.quantity}&nbsp;${order.unit}</div><div class="order-status" style="background:#866;">Aufgebraucht</div></div><div class="order-details">Art-Nr: ${order.articleNumber} · ${order.department}, 📅 ${deliveryDisplay}, ${order.deliveryTime}</div>`; card.addEventListener('click', async () => { try { await db.collection('orders').doc(order.id).update({ status: 'erledigt' }); card.remove(); } catch (error) { console.error('Fehler beim Aktualisieren des Status:', error); alert('Fehler: Status konnte nicht geändert werden.'); } }); usedItemsList.appendChild(card); }); }
    let usedUnsub = null; toggleUsedBtn.addEventListener('click', () => { usedItemsVisible = !usedItemsVisible; usedItemsList.style.display = usedItemsVisible ? 'block' : 'none'; toggleUsedBtn.textContent = usedItemsVisible ? '❌' : '🚫'; if (usedItemsVisible) { usedUnsub = db.collection('orders').where('status', '==', 'aufgebraucht').onSnapshot((snapshot) => { const orders = []; snapshot.forEach(doc => { orders.push({ id: doc.id, ...doc.data() }); }); orders.sort((a, b) => (a.deliveryDateTime?.seconds || 0) - (b.deliveryDateTime?.seconds || 0)); renderUsedItems(orders); }, (error) => { console.error('Fehler beim Laden der aufgebrauchten Artikel:', error); usedItemsList.innerHTML = `<div class="no-orders">Fehler: ${error.message}</div>`; }); } else { if (usedUnsub) { usedUnsub(); usedUnsub = null; } } });
    document.getElementById('ordersList').addEventListener('click', async (e) => { const orderId = e.target.closest('[data-id]')?.dataset.id; if (!orderId) return; if (e.target.classList.contains('toggle-comment')) { const editor = document.querySelector(`.comment-editor[data-id="${orderId}"]`); editor.style.display = editor.style.display === 'block' ? 'none' : 'block'; return; } if (e.target.classList.contains('save-comment')) { const textarea = document.querySelector(`.comment-input[data-id="${orderId}"]`); const comment = textarea.value.trim(); try { await db.collection('orders').doc(orderId).update({ comment: comment || firebase.firestore.FieldValue.delete() }); document.querySelector(`.comment-editor[data-id="${orderId}"]`).style.display = 'none'; } catch (err) { console.error('Fehler beim Speichern:', err); alert('Fehler: ' + (err.message || 'Speichern fehlgeschlagen.')); } return; } if (e.target.classList.contains('cancel-comment')) { document.querySelector(`.comment-editor[data-id="${orderId}"]`).style.display = 'none'; } });
    loadOrders();
  </script>
</body>
</html>
