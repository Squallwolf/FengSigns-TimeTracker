{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card" style="text-align: center; margin-top: 40px;">
    <h1>⏱ Zeiterfassung</h1>
    <p style="margin: 20px 0; color: #666;">PIN eingeben zum Anmelden</p>
    <form method="post">
        <div class="form-group">
            <input type="password" name="pin" class="form-control" 
                   maxlength="4" pattern="\d{4}" placeholder="••••" 
                   inputmode="numeric" autofocus required>
        </div>
        <button type="submit" class="btn btn-large">Anmelden</button>
    </form>
    <p style="margin-top: 20px; font-size: 14px; color: #999;">
        <a href="/admin" style="color: #6c757d;">Admin-Bereich</a>
    </p>
</div>
{% endblock %}
