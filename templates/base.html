<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zeiterfassung{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
               background: #f5f5f5; color: #333; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; 
                box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 12px 24px; background: #007bff; color: white; 
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; 
               text-decoration: none; text-align: center; }
        .btn:hover { background: #0056b3; }
        .btn-large { padding: 20px 40px; font-size: 20px; width: 100%; margin: 10px 0; }
        .btn-in { background: #28a745; } .btn-in:hover { background: #1e7e34; }
        .btn-out { background: #dc3545; } .btn-out:hover { background: #a71d2a; }
        .btn-secondary { background: #6c757d; } .btn-secondary:hover { background: #545b62; }
        .form-group { margin: 16px 0; }
        .form-control { width: 100%; padding: 12px; font-size: 18px; border: 2px solid #ddd; 
                       border-radius: 8px; text-align: center; }
        .form-control:focus { border-color: #007bff; outline: none; }
        .status { padding: 16px; border-radius: 8px; text-align: center; font-weight: 500; margin: 16px 0; }
        .status.present { background: #d4edda; color: #155724; }
        .status.absent { background: #f8d7da; color: #721c24; }
        .flash { padding: 12px; border-radius: 8px; margin: 16px 0; }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.error { background: #f8d7da; color: #721c24; }
        .flash.info { background: #cce5ff; color: #004085; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; }
        .logout { color: #6c757d; text-decoration: none; font-size: 14px; }
        .logout:hover { color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash {{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
